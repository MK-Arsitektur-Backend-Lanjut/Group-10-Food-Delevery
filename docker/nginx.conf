worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    keepalive_timeout  300;
    keepalive_requests 10000;

    # Nginx FastCGI Cache configuration for ultra-high concurrency
    fastcgi_cache_path /var/cache/nginx levels=1:2 keys_zone=API_CACHE:100m inactive=60m;
    fastcgi_cache_key "$scheme$request_method$host$request_uri";
    fastcgi_ignore_headers Cache-Control Expires Set-Cookie;

    # Buffer settings
    client_body_buffer_size 16k;
    client_max_body_size 10m;

    # Proxy buffering
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;

    # Gzip compression
    gzip on;
    gzip_comp_level 5;
    gzip_types application/json text/plain text/css application/javascript;

    # Upstream PHP-FPM dengan keepalive
    upstream php-fpm {
        server app:9000;
        keepalive 128;
    }

    server {
        listen 80 backlog=16384;
        server_name localhost;
        root /var/www/html/public;
        index index.php index.html;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass php-fpm;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;

            # Performance tuning - naikkan timeout
            fastcgi_buffering on;
            fastcgi_buffer_size 32k;
            fastcgi_buffers 32 32k;
            fastcgi_connect_timeout 300;
            fastcgi_send_timeout 300;
            fastcgi_read_timeout 300;

            # Enable FastCGI Cache
            fastcgi_cache API_CACHE;
            fastcgi_cache_valid 200 60m;
            fastcgi_cache_use_stale error timeout invalid_header updating http_500;
            fastcgi_cache_lock on;
            
            # Hide cookies from cache
            fastcgi_hide_header Set-Cookie;

            # Keepalive ke PHP-FPM
            fastcgi_keep_conn on;
        }

        location ~ /\.ht {
            deny all;
        }
    }
}
